<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GST Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>GST Calculator</h1>

    <label for="amount">Enter amount</label>
    <input type="text" id="amount" placeholder="₹ Amount">

    <label for="gst">Select GST rate</label>
    <select id="gst">
      <option value="5">5% GST</option>
      <option value="12">12% GST</option>
      <option value="18">18% GST</option>
      <option value="28">28% GST</option>
    </select>

    <button id="calculateBtn">Calculate</button>

    <div class="result">
      <p id="gstAmount">GST Amount: ₹0</p>
      <p id="totalAmount">Total Amount: ₹0</p>
    </div>

    <a class="dh-btn" href="https://digitalheroesco.com" target="_blank" rel="noreferrer">Built for Digital Heroes</a>

    <div class="footer">
      <p>Sarthak Dagar</p>
      <p>sarthakdagar77@gmail.com</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
